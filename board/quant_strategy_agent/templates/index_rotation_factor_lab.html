<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>量化策略Agent</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg', v=app_version) }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css', v=app_version) }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/index_enhancement.css', v=app_version) }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/rotation_module.css', v=app_version) }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/factor_lab.css', v=app_version) }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui_unified.css', v=app_version) }}">
  <link rel="preload" href="{{ url_for('static', filename='vendor/plotly.min.js', v=app_version) }}" as="script">
  <link rel="preload" href="{{ url_for('static', filename='js/app.js', v=app_version) }}" as="script">
</head>
<body class="is-authenticated">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <span class="brand-mark">策</span>
        <div><strong>量化策略Agent</strong></div>
      </div>
      <nav class="section-nav" aria-label="功能目录">
        <section class="nav-group nav-group-single">
          <button class="nav-item is-active" data-target="home:overview">主页<i></i></button>
        </section>
        <section class="nav-group">
          <button class="nav-group-toggle" type="button" aria-expanded="false">数据看板<span aria-hidden="true"></span></button>
          <div class="nav-children" hidden>
            <button class="nav-item" data-target="data:macro">宏观<i></i></button>
            <button class="nav-item" data-target="data:global_markets">全球市场<i></i></button>
            <button class="nav-item" data-target="data:sw_industries">行业<i></i></button>
            <button class="nav-item" data-target="data:commodities">大宗商品<i></i></button>
            <button class="nav-item" data-target="data:stock">个股<i></i></button>
            <button class="nav-item" data-target="data:news_events">新闻事件<i></i></button>
            <button class="nav-item" data-target="data:ai_monitor">AI监控<i></i></button>
          </div>
        </section>
        <section class="nav-group">
          <button class="nav-group-toggle" type="button" aria-expanded="false">资产配置<span aria-hidden="true"></span></button>
          <div class="nav-children" hidden>
            <button class="nav-item" data-target="allocation:cycle">周期跟踪<i></i></button>
            <button class="nav-item" data-target="allocation:strategy">配置策略<i></i></button>
          </div>
        </section>
        <section class="nav-group">
          <button class="nav-group-toggle" type="button" aria-expanded="false">资金面跟踪<span aria-hidden="true"></span></button>
          <div class="nav-children" hidden>
            <button class="nav-item" data-target="liquidity:retail">散户<i></i></button>
            <button class="nav-item" data-target="liquidity:public">公募<i></i></button>
            <button class="nav-item" data-target="liquidity:private">私募<i></i></button>
            <button class="nav-item" data-target="liquidity:foreign">外资<i></i></button>
            <button class="nav-item" data-target="liquidity:etf">ETF<i></i></button>
            <button class="nav-item" data-target="liquidity:primary">一级市场<i></i></button>
            <button class="nav-item" data-target="liquidity:margin">融资资金<i></i></button>
          </div>
        </section>
        <section class="nav-group">
          <button class="nav-group-toggle" type="button" aria-expanded="false">行业景气度<span aria-hidden="true"></span></button>
          <div class="nav-children" hidden>
            <button class="nav-item" data-target="rotation:industry">行业景气度<i></i></button>
            <button class="nav-item" data-target="rotation:style">风格轮动<i></i></button>
            <button class="nav-item" data-target="rotation:allocation">配置策略<i></i></button>
          </div>
        </section>
        <section class="nav-group" data-module="factor-lab">
          <button class="nav-group-toggle" type="button" aria-expanded="false">因子实验室<span aria-hidden="true"></span></button>
          <div class="nav-children" hidden>
            <button class="nav-item" data-target="factorlab:dashboard">因子看板<i></i></button>
            <button class="nav-item" data-target="factorlab:mining">因子挖掘<i></i></button>
            <button class="nav-item" data-target="factorlab:strategy">配置策略<i></i></button>
          </div>
        </section>
        <section class="nav-group">
          <button class="nav-group-toggle" type="button" aria-expanded="false">技术分析<span aria-hidden="true"></span></button>
          <div class="nav-children" hidden>
            <button class="nav-item" data-target="technical:learning">K线学习<i></i></button>
            <button class="nav-item" data-target="technical:strategy">配置策略<i></i></button>
          </div>
        </section>
        <section class="nav-group portfolio-optimization-nav">
          <button class="nav-group-toggle" type="button" aria-expanded="false">组合优化<span aria-hidden="true"></span></button>
          <div class="nav-children" hidden>
            <button class="nav-item" data-target="portfolio:solve">优化求解<i></i></button>
            <button class="nav-item" data-target="portfolio:strategy">配置策略<i></i></button>
          </div>
        </section>
      </nav>
    </aside>

    <main class="dashboard-main">
      <header class="topbar">
        <div class="topbar-meta"><span>日度自动更新</span><b>·</b><span>上海时间</span><b>·</b><span id="service-clock">载入中</span></div>
        <div id="service-badges" class="service-badges"></div>
        <form action="{{ url_for('logout') }}" method="post"><button class="ghost-button" type="submit">退出登录</button></form>
      </header>
      <section id="workspace-controls" class="workspace-controls" aria-label="统一参数与板块目录"></section>
      <section class="page-heading">
        <div><span id="page-eyebrow" class="eyebrow">研究总览</span><h1 id="page-title">中国宏观</h1><p id="page-subtitle">增长、通胀、流动性与实体高频跟踪</p></div>
      </section>
      <section id="core-conclusion" class="conclusion-card" role="status"><span class="eyebrow">核心结论</span><p>正在载入核心结论。</p></section>
      <section id="view-root" class="view-root"><div class="loading-card">正在载入统一工作台。</div></section>
    </main>
  </div>
  <script>
    window.APP_BOOT = {
      user: {{ user|tojson }},
      version: {{ app_version|tojson }},
      publicHost: {{ public_host|tojson }},
      basePath: {{ request.script_root|tojson }},
      plotlyUrl: {{ url_for('static', filename='vendor/plotly.min.js', v=app_version)|tojson }}
    };
  </script>

  <script defer src="{{ url_for('static', filename='ai_monitor/js/core.js', v=app_version) }}"></script>
  <script defer src="{{ url_for('static', filename='ai_monitor/js/features.js', v=app_version) }}"></script>
  <script defer src="{{ url_for('static', filename='ai_monitor/js/weights.js', v=app_version) }}"></script>
  <script defer src="{{ url_for('static', filename='ai_monitor/js/boot.js', v=app_version) }}"></script>
  <script defer src="{{ url_for('static', filename='ai_monitor/js/axis.js', v=app_version) }}"></script>
  <script defer src="{{ url_for('static', filename='ai_monitor/js/shell.js', v=app_version) }}"></script>
  <script defer src="{{ url_for('static', filename='js/app.js', v=app_version) }}"></script>
  <script defer src="{{ url_for('static', filename='js/index_enhancement.js', v=app_version) }}"></script>
  <script defer src="{{ url_for('static', filename='js/rotation_module.js', v=app_version) }}"></script>
  <script defer src="{{ url_for('static', filename='js/factor_lab.js', v=app_version) }}"></script>
</body>
</html>
